  </g>
  <g transform="translate(370,100)">
    <circle r="42" class="ring-bg" fill="none" stroke-width="6"/>
    <circle r="42" class="ring-fg" fill="none" stroke-width="6" stroke-linecap="round"
            stroke-dasharray="264" stroke-dashoffset="55" transform="rotate(-90)"/>
    <text text-anchor="middle" y="8" class="rank">B+</text>
