<svg width="450" height="200" viewBox="0 0 450 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="current design">
  <style>
    .bg{fill:#0d1117}
    .title{fill:#58a6ff;font:600 18px 'Segoe UI',system-ui,sans-serif}
    .label{fill:#c9d1d9;font:400 13px 'Segoe UI',system-ui,sans-serif}
    .value{fill:#c9d1d9;font:700 14px 'Segoe UI',system-ui,sans-serif}
    .icon{fill:none;stroke:#bf91f3;stroke-width:2}
    .ring-bg{stroke:#21262d}
    .ring-fg{stroke:#bf91f3}
    .rank{fill:#bf91f3;font:800 22px 'Segoe UI',system-ui,sans-serif}
  </style>
  <rect x="0.5" y="0.5" width="449" height="199" rx="6" class="bg" stroke="#30363d"/>
  <text x="25" y="36" class="title">Ronen Mars' GitHub Stats</text>
  <g transform="translate(25,62)">
    <g transform="translate(0,0)"><path class="icon" d="M8 0l2.35 4.76L15.6 5.5l-3.8 3.7.9 5.25L8 11.98"/>
      <text x="26" y="12" class="label">Total Stars Earned:</text><text x="230" y="12" class="value">3</text></g>
    <g transform="translate(0,28)"><circle class="icon" cx="8" cy="8" r="7"/>
      <text x="26" y="12" class="label">Total Commits (2026):</text><text x="230" y="12" class="value">2.4k</text></g>
    <g transform="translate(0,56)"><path class="icon" d="M5 3a2 2 0 100 4M11 5a2 2 0 100 4"/>
      <text x="26" y="12" class="label">Total PRs:</text><text x="230" y="12" class="value">1.9k</text></g>
    <g transform="translate(0,84)"><circle class="icon" cx="8" cy="8" r="7"/>
      <text x="26" y="12" class="label">Total Issues:</text><text x="230" y="12" class="value">9</text></g>
    <g transform="translate(0,112)"><rect class="icon" x="1" y="2" width="14" height="12" rx="2"/>
